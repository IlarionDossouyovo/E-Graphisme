<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond -->
  <rect width="100" height="100" rx="22" fill="#0a0a0f"/>
  
  <!-- Anneau externe subtil -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#mainGrad)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Lettre E compacte -->
  <g filter="url(#intenseGlow)">
    <path d="M 25 22 L 25 78 Q 25 85 32 85 L 48 85" 
          fill="none" stroke="url(#mainGrad)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 25 22 Q 18 22 18 29 L 18 38 Q 18 45 25 45 L 55 45" 
          fill="none" stroke="url(#mainGrad)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 25 53 L 48 53" 
          fill="none" stroke="url(#mainGrad)" stroke-width="12" stroke-linecap="round"/>
  </g>
  
  <!-- Triangle Play compact -->
  <g filter="url(#glow)">
    <polygon points="58,35 58,65 88,50" fill="url(#mainGrad)"/>
  </g>
  
  <!-- Point lumineux animé -->
  <circle cx="18" cy="29" r="2" fill="#00FFFF">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="88" cy="50" r="2" fill="#FF00FF">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>