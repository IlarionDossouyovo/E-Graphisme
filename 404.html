<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page non trouvée - E-Graphisme">
    <title>404 - Page Non Trouvée | E-Graphisme</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            position: relative;
            overflow: hidden;
        }
        
        .error-content {
            text-align: center;
            z-index: 2;
            padding: 20px;
        }
        
        .error-number {
            font-size: 10rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        .error-content h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: var(--dark-color);
        }
        
        .error-content p {
            color: var(--gray-color);
            font-size: 1.1rem;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .error-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .error-page .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }
        
        .error-page .shape-1 {
            width: 300px;
            height: 300px;
            background: var(--gradient);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .error-page .shape-2 {
            width: 200px;
            height: 200px;
            background: var(--gradient);
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="hero-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>
        
        <div class="error-content">
            <div class="error-number">404</div>
            <h1>Oups! Page Non Trouvée</h1>
            <p>La page que vous recherchez semble avoir disparu. Elle a peut-être été déplacée ou n'existe plus.</p>
            <div class="error-buttons">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Retour à l'Accueil
                </a>
                <a href="contact.html" class="btn btn-secondary">
                    <i class="fas fa-envelope"></i> Nous Contacter
                </a>
            </div>
        </div>
    </div>
</body>
</html>
