<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Gradient principal: bleu électrique vers violet fluo -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="40%" stop-color="#5B8DEF"/>
      <stop offset="70%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
    
    <!-- Gradient radial pour l'effet cérébral -->
    <radialGradient id="brainGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#7B2FFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7B2FFF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Effet de lueur principale -->
    <filter id="mainGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Effet de lueur intense -->
    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Effet néon -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Masque de clip pour le fond -->
    <clipPath id="bgClip">
      <rect x="60" y="60" width="280" height="280" rx="30"/>
    </clipPath>
  </defs>
  
  <!-- Fond sombre avec effet vitreux -->
  <rect x="50" y="50" width="300" height="300" rx="30" fill="#0a0a0f"/>
  <rect x="50" y="50" width="300" height="300" rx="30" fill="url(#brainGlow)" opacity="0.3"/>
  
  <!-- Grille technologique subtile -->
  <g opacity="0.1" clip-path="url(#bgClip)">
    <line x1="100" y1="50" x2="100" y2="350" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="150" y1="50" x2="150" y2="350" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="200" y1="50" x2="200" y2="350" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="250" y1="50" x2="250" y2="350" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="300" y1="50" x2="300" y2="350" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="50" y1="100" x2="350" y2="100" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="50" y1="150" x2="350" y2="150" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="50" y1="200" x2="350" y2="200" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="50" y1="250" x2="350" y2="250" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="50" y1="300" x2="350" y2="300" stroke="#00D4FF" stroke-width="0.5"/>
  </g>
  
  <!-- Anneaux concentriques -->
  <circle cx="200" cy="200" r="135" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.4"/>
  <circle cx="200" cy="200" r="125" fill="none" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Hexagone externe (structure cinématographique) -->
  <polygon points="200,70 280,115 280,285 200,330 120,285 120,115" 
           fill="none" stroke="url(#mainGradient)" stroke-width="2" 
           opacity="0.5" filter="url(#mainGlow)"/>
  
  <!-- Réseau neuronal / Cerveau IA -->
  <g opacity="0.2">
    <circle cx="160" cy="160" r="20" fill="#00D4FF"/>
    <circle cx="240" cy="160" r="18" fill="#7B2FFF"/>
    <circle cx="200" cy="200" r="28" fill="#00D4FF"/>
    <circle cx="160" cy="240" r="18" fill="#7B2FFF"/>
    <circle cx="240" cy="240" r="20" fill="#00D4FF"/>
    <circle cx="130" cy="200" r="12" fill="#7B2FFF"/>
    <circle cx="270" cy="200" r="12" fill="#7B2FFF"/>
    
    <line x1="160" y1="160" x2="200" y2="200" stroke="#00D4FF" stroke-width="2" opacity="0.8"/>
    <line x1="240" y1="160" x2="200" y2="200" stroke="#7B2FFF" stroke-width="2" opacity="0.8"/>
    <line x1="160" y1="240" x2="200" y2="200" stroke="#7B2FFF" stroke-width="2" opacity="0.8"/>
    <line x1="240" y1="240" x2="200" y2="200" stroke="#00D4FF" stroke-width="2" opacity="0.8"/>
    <line x1="130" y1="200" x2="200" y2="200" stroke="#7B2FFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="270" y1="200" x2="200" y2="200" stroke="#7B2FFF" stroke-width="1.5" opacity="0.6"/>
    <line x1="160" y1="160" x2="240" y2="160" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="240" x2="240" y2="240" stroke="#7B2FFF" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Lettre E stylisée avec effet néon -->
  <g filter="url(#intenseGlow)">
    <path d="M 135 115 L 135 285 Q 135 300 155 300 L 195 300" 
          fill="none" stroke="url(#mainGradient)" stroke-width="28" stroke-linecap="round"/>
    <path d="M 135 115 Q 120 115 120 130 L 120 165 Q 120 180 135 180 L 215 180" 
          fill="none" stroke="url(#mainGradient)" stroke-width="28" stroke-linecap="round"/>
    <path d="M 135 200 L 190 200" 
          fill="none" stroke="url(#mainGradient)" stroke-width="28" stroke-linecap="round"/>
    <path d="M 135 285 Q 120 285 120 270 L 120 235 Q 120 220 135 220 L 205 220" 
          fill="none" stroke="url(#mainGradient)" stroke-width="28" stroke-linecap="round"/>
  </g>
  
  <!-- Contour lumineux du E -->
  <g filter="url(#neonGlow)" opacity="0.8">
    <path d="M 135 115 L 135 285 Q 135 300 155 300 L 195 300" 
          fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round"/>
    <path d="M 135 115 Q 120 115 120 130 L 120 165 Q 120 180 135 180 L 215 180" 
          fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round"/>
    <path d="M 135 200 L 190 200" 
          fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round"/>
    <path d="M 135 285 Q 120 285 120 270 L 120 235 Q 120 220 135 220 L 205 220" 
          fill="none" stroke="#00FFFF" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Triangle Play intégré avec effet néon -->
  <g filter="url(#neonGlow)">
    <polygon points="235,140 235,260 310,200" fill="url(#mainGradient)"/>
    <polygon points="235,140 235,260 310,200" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Points lumineux pour l'effet futuriste -->
  <g>
    <circle cx="120" cy="130" r="4" fill="#00FFFF">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="215" cy="180" r="3" fill="#FF00FF">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="200" r="5" fill="#00FFFF">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="200" r="4" fill="#FF00FF">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="270" r="3" fill="#00FFFF">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Éléments cinématographiques (cadres) -->
  <g opacity="0.3">
    <line x1="85" y1="95" x2="110" y2="95" stroke="#00D4FF" stroke-width="2"/>
    <circle cx="85" cy="95" r="3" fill="#00D4FF"/>
    <line x1="290" y1="305" x2="315" y2="305" stroke="#7B2FFF" stroke-width="2"/>
    <circle cx="315" cy="305" r="3" fill="#7B2FFF"/>
    <path d="M 70 80 L 70 70 L 80 70" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <path d="M 330 70 L 340 70 L 340 80" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <path d="M 340 320 L 340 330 L 330 330" fill="none" stroke="#7B2FFF" stroke-width="2"/>
    <path d="M 70 330 L 70 320 L 80 320" fill="none" stroke="#7B2FFF" stroke-width="2"/>
  </g>
</svg>