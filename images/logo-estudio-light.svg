<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
    
    <filter id="mainGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond transparent (pour fond clair) -->
  
  <!-- Anneaux concentriques -->
  <circle cx="200" cy="200" r="135" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.6"/>
  <circle cx="200" cy="200" r="125" fill="none" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Hexagone externe -->
  <polygon points="200,70 280,115 280,285 200,330 120,285 120,115" 
           fill="none" stroke="url(#mainGradient)" stroke-width="2" 
           opacity="0.7" filter="url(#mainGlow)"/>
  
  <!-- Lettre E stylisée -->
  <g filter="url(#intenseGlow)">
    <path d="M 135 115 L 135 285 Q 135 300 155 300 L 195 300" 
          fill="none" stroke="url(#mainGradient)" stroke-width="28" stroke-linecap="round"/>
    <path d="M 135 115 Q 120 115 120 130 L 120 165 Q 120 180 135 180 L 215 180" 
          fill="none" stroke="url(#mainGradient)" stroke-width="28" stroke-linecap="round"/>
    <path d="M 135 200 L 190 200" 
          fill="none" stroke="url(#mainGradient)" stroke-width="28" stroke-linecap="round"/>
    <path d="M 135 285 Q 120 285 120 270 L 120 235 Q 120 220 135 220 L 205 220" 
          fill="none" stroke="url(#mainGradient)" stroke-width="28" stroke-linecap="round"/>
  </g>
  
  <!-- Triangle Play -->
  <g filter="url(#mainGlow)">
    <polygon points="235,140 235,260 310,200" fill="url(#mainGradient)"/>
  </g>
  
  <!-- Points lumineux -->
  <circle cx="120" cy="130" r="4" fill="#00D4FF" filter="url(#mainGlow)"/>
  <circle cx="200" cy="200" r="5" fill="#7B2FFF" filter="url(#mainGlow)"/>
  <circle cx="310" cy="200" r="4" fill="#FF006E" filter="url(#mainGlow)"/>
</svg>